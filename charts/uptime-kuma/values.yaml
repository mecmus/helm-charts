replicaCount: 1

image:
  repository: louislam/uptime-kuma
  # renovate: datasource=docker depName=louislam/uptime-kuma
  tag: "2.3.2"
  pullPolicy: IfNotPresent

nameOverride: ""
fullnameOverride: ""

service:
  type: ClusterIP
  port: 80
  targetPort: 3001
  annotations: {}

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: uptime-kuma.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

persistence:
  enabled: true
  existingClaim: ""
  storageClass: ""
  accessModes:
    - ReadWriteOnce
  size: 4Gi

admin:
  enabled: true
  username: admin
  password: ""
  existingSecret: ""
  existingSecretUsernameKey: username
  existingSecretPasswordKey: password
  job:
    annotations: {}
    backoffLimit: 6
    activeDeadlineSeconds: 300
    ttlSecondsAfterFinished: 300
    restartPolicy: Never
    image:
      repository: ""
      tag: ""
      pullPolicy: IfNotPresent
    podSecurityContext: {}
    securityContext: {}
    resources: {}

resources: {}

podAnnotations: {}
podSecurityContext: {}
securityContext: {}

nodeSelector: {}
tolerations: []
affinity: {}
