{{- if .Values.admin.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "uptime-kuma.fullname" . }}-admin-init
  labels:
    {{- include "uptime-kuma.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "5"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
    {{- with .Values.admin.job.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  backoffLimit: {{ .Values.admin.job.backoffLimit }}
  activeDeadlineSeconds: {{ .Values.admin.job.activeDeadlineSeconds }}
  ttlSecondsAfterFinished: {{ .Values.admin.job.ttlSecondsAfterFinished }}
  template:
    metadata:
      labels:
        {{- include "uptime-kuma.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: admin-init
    spec:
      restartPolicy: {{ .Values.admin.job.restartPolicy }}
      securityContext:
        {{- toYaml .Values.admin.job.podSecurityContext | nindent 8 }}
      containers:
        - name: admin-init
          image: "{{ default .Values.image.repository .Values.admin.job.image.repository }}:{{ default .Values.image.tag .Values.admin.job.image.tag }}"
          imagePullPolicy: {{ .Values.admin.job.image.pullPolicy }}
          command:
            - /bin/sh
            - -ec
            - |
              cd /app
              max_attempts={{ .Values.admin.job.maxAttempts }}
              retry_delay={{ .Values.admin.job.retryDelaySeconds }}
              for attempt in $(seq 1 "$max_attempts"); do
              if node <<'NODE'
              const { io } = require("socket.io-client");
              const http = require("http");
              const https = require("https");

              const timeout = 10000;
              const url = process.env.UPTIME_KUMA_URL;
              const username = process.env.UPTIME_KUMA_USERNAME;
              const password = process.env.UPTIME_KUMA_PASSWORD;
              const SQLITE_DB_CONFIG = { dbConfig: { type: "sqlite" } };

              function makeHttpRequest(method, targetUrl, body) {
                return new Promise((resolve, reject) => {
                  const payload = body ? JSON.stringify(body) : null;
                  const options = {
                    method,
                    timeout,
                    headers: payload ? {
                      "Content-Type": "application/json",
                      "Content-Length": Buffer.byteLength(payload),
                    } : {},
                  };
                  const lib = targetUrl.startsWith("https") ? https : http;
                  const req = lib.request(targetUrl, options, (res) => {
                    let data = "";
                    res.setEncoding("utf8");
                    res.on("data", (chunk) => {
                      data += chunk;
                    });
                    res.on("end", () => {
                      resolve({ statusCode: res.statusCode, headers: res.headers, body: data });
                    });
                  });
                  req.on("error", reject);
                  req.on("timeout", () => { req.destroy(); reject(new Error("HTTP request timed out")); });
                  if (payload) {
                    req.write(payload);
                  }
                  req.end();
                });
              }

              function emit(socket, event, ...args) {
                return new Promise((resolve, reject) => {
                  const timer = setTimeout(() => reject(new Error(`${event} timed out`)), timeout);
                  socket.emit(event, ...args, (response) => {
                    clearTimeout(timer);
                    resolve(response);
                  });
                });
              }

              function connectSocket() {
                return new Promise((resolve, reject) => {
                  const socket = io(url, {
                    reconnection: false,
                    timeout,
                    transports: ["websocket", "polling"],
                  });
                  socket.once("connect", () => resolve(socket));
                  socket.once("connect_error", reject);
                });
              }

              function getSetupDatabaseInfoUrl() {
                return new URL("/setup-database-info", url).toString();
              }

              function getSetupDatabaseUrl() {
                return new URL("/setup-database", url).toString();
              }

              function parseJsonResponse(body, context) {
                try {
                  return JSON.parse(body || "{}");
                } catch (error) {
                  throw new Error(`Failed to parse ${context} response: ${error.message}`);
                }
              }

              async function getSetupDatabaseInfo() {
                const res = await makeHttpRequest("GET", getSetupDatabaseInfoUrl());
                if (res.statusCode !== 200) {
                  throw new Error(`Unexpected status from /setup-database-info: ${res.statusCode}`);
                }
                return parseJsonResponse(res.body, "/setup-database-info");
              }

              async function needsDatabaseSetup() {
                const info = await getSetupDatabaseInfo();
                return info.needSetup === true;
              }

              async function setupDatabase() {
                const res = await makeHttpRequest("POST", getSetupDatabaseUrl(), SQLITE_DB_CONFIG);
                if (res.statusCode !== 200) {
                  throw new Error(`Database setup failed with status ${res.statusCode}: ${res.body || "empty response"}`);
                }
                return parseJsonResponse(res.body, "/setup-database");
              }

              async function waitForReady(maxAttempts, delay) {
                for (let i = 0; i < maxAttempts; i++) {
                  try {
                    const info = await getSetupDatabaseInfo();
                    if (info.needSetup === false && info.runningSetup === false) {
                      return;
                    }
                  } catch (e) {
                    // app may be restarting, keep waiting
                  }
                  await new Promise((r) => setTimeout(r, delay));
                }
                throw new Error(`Timed out waiting for Uptime Kuma to be ready after database setup (waited ${maxAttempts * delay / 1000}s)`);
              }

              async function main() {
                // Step 1: Check if database setup is needed (Uptime Kuma 2.x)
                if (await needsDatabaseSetup()) {
                  console.log("Database setup required. Setting up SQLite database...");
                  const dbResult = await setupDatabase();

                  if (!dbResult || !dbResult.ok) {
                    const message = dbResult && dbResult.msg ? dbResult.msg : "database setup failed";
                    throw new Error(`Database setup failed: ${message} (response: ${JSON.stringify(dbResult)})`);
                  }

                  console.log("Database setup complete. Waiting for Uptime Kuma to restart...");
                  await waitForReady(30, 2000);
                }

                // Step 2: Admin account setup
                const socket = await connectSocket();

                const needSetup = await emit(socket, "needSetup");
                if (!needSetup) {
                  console.log("Uptime Kuma is already initialized.");
                  socket.close();
                  return;
                }

                const result = await emit(socket, "setup", username, password);
                socket.close();

                if (!result || !result.ok) {
                  const message = result && result.msg ? result.msg : "admin setup failed";
                  if (message.includes("has been initialized")) {
                    console.log("Uptime Kuma is already initialized.");
                    return;
                  }
                  throw new Error(message);
                }

                console.log("Uptime Kuma admin account initialized.");
              }

              main().catch((error) => {
                console.error(error.message);
                process.exit(1);
              });
              NODE
              then
                exit 0
              fi

                if [ "$attempt" -lt "$max_attempts" ]; then
                  sleep "$retry_delay"
                fi
              done

              echo "Unable to initialize Uptime Kuma admin account after $max_attempts attempts." >&2
              exit 1
          env:
            - name: UPTIME_KUMA_URL
              value: "http://{{ include "uptime-kuma.fullname" . }}:{{ .Values.service.port }}"
            - name: UPTIME_KUMA_USERNAME
              valueFrom:
                secretKeyRef:
                  name: {{ include "uptime-kuma.adminSecretName" . }}
                  key: {{ .Values.admin.existingSecretUsernameKey }}
            - name: UPTIME_KUMA_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "uptime-kuma.adminSecretName" . }}
                  key: {{ .Values.admin.existingSecretPasswordKey }}
          securityContext:
            {{- toYaml .Values.admin.job.securityContext | nindent 12 }}
          resources:
            {{- toYaml .Values.admin.job.resources | nindent 12 }}
{{- end }}
